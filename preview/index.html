<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="bar">
      <span id="scene-name">Scene Viewer</span>
      <div id="picker"></div>
      <span id="status">click a scene or drop a .scene.json</span>
      <label id="open-label">
        Open
        <input type="file" id="file-input" accept=".json" style="display:none" />
      </label>
    </header>
    <div id="main">
      <aside id="sidebar">
        <div id="tree"></div>
      </aside>
      <div id="viewport">
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
